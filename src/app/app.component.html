<div class="scene">
  <canvas #dotCanvas id="dotCanvas"></canvas>

  <div class="card">
    <h1 class="card-title">Password</h1>
    <p class="card-sub">Secure your account</p>

    <div class="input-wrap">
      <input
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="password"
        placeholder="Enter password"
        class="pw-input"
        autocomplete="new-password"
      />
      <button
        class="toggle-btn"
        type="button"
        (click)="showPassword = !showPassword"
        [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
      >
        <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>

    <div class="strength-row" *ngIf="password">
      <span class="strength-label" [style.color]="strengthColor">{{ strengthLabel }}</span>
      <span class="strength-pct">{{ strengthPercent }}</span>
    </div>
    <div class="track">
      <div
        class="fill"
        [style.width]="strengthPercent"
        [style.background]="strengthColor"
      ></div>
    </div>

    <div class="checklist">
      <div
        class="chk"
        *ngFor="let c of checks"
        [class.pass]="passes(c.test)"
        [class.show]="password.length > 0"
      >
        <span class="chk-dot"></span>
        <span class="chk-label">{{ c.label }}</span>
      </div>
    </div>
  </div>
</div>
